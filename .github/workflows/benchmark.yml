name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "crates/**"
      - "packages/**"
      - ".github/workflows/benchmark.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  codspeed-node:
    name: ⚡ CodSpeed (Node.js)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/setup-node
      - name: 🔨 Build native binding
        run: |
          cargo build -p unifast-bindings-node --release
          mkdir -p packages/node/native
          cp target/release/libunifast_bindings_node.so packages/node/native/unifast.node
      - name: 🏗️ Build packages
        run: pnpm build --filter=@unifast/benchmark...
      - name: 🚀 Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: pnpm --filter @unifast/benchmark exec vitest bench --run --exclude '**/frontmatter.bench.ts'

  codspeed-rust:
    name: ⚡ CodSpeed (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: 📦 Install cargo-codspeed
        run: cargo install cargo-codspeed --locked
      - name: 🔨 Build benchmarks
        run: cargo codspeed build -m simulation
      - name: 🚀 Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run
