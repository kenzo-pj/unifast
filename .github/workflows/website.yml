name: Website

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "website/**"
      - "packages/**"
      - "crates/**"
      - ".github/workflows/website.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: 🎨 Lint CSS
        run: pnpm --filter @unifast/website lint:css
      - name: 📝 Lint Markdown
        run: pnpm --filter @unifast/website lint:md
      - name: ✏️ Lint text
        run: pnpm --filter @unifast/website lint:text

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust

      - name: 🔨 Build native binding
        run: |
          cargo build -p unifast-bindings-node --release
          mkdir -p packages/node/native
          cp target/release/libunifast_bindings_node.so packages/node/native/unifast.node

      - uses: ./.github/actions/setup-node
      - name: 🏗️ Build website
        run: pnpm build:website
        env:
          GH_SPONSORS_TOKEN: ${{ secrets.GH_SPONSORS_TOKEN }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
      - name: 📄 Add .nojekyll
        run: touch website/dist/.nojekyll

      - name: 📤 Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: 🚀 Deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
