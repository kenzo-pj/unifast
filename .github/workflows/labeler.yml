name: Labeler

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: 🏷️ Label PR
    runs-on: ubuntu-latest
    steps:
      - name: 🏷️ Auto-label PR
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
