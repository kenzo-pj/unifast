name: Rust

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  format:
    name: 🎨 Format
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - name: 🎨 Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: 📎 Clippy
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: 📎 Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: 🧪 Run tests
        run: cargo test --all --all-features

  node-binding:
    name: 🟢 Node Binding
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: 🔨 Check Node binding
        run: cargo check -p unifast-bindings-node

  wasm-binding:
    name: 🌐 WASM Binding
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: 🔧 Add WASM target
        run: rustup target add wasm32-unknown-unknown
      - name: 🔨 Check WASM binding
        run: cargo check -p unifast-bindings-wasm --target wasm32-unknown-unknown
