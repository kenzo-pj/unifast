name: TypeScript

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - ".github/workflows/typescript.yml"

jobs:
  oxfmt-check:
    name: 🎨 Format (oxfmt)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🎨 Check formatting
        run: pnpm fmt:oxc:check

  oxlint:
    name: 🔍 Lint (oxlint)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🔍 Run oxlint
        run: pnpm lint:oxc

  typecheck:
    name: 🏷️ Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🏷️ Run typecheck
        run: pnpm typecheck

  vitest:
    name: 🧪 Test (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🧪 Run tests
        run: pnpm test
