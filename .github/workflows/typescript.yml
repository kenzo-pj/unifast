name: TypeScript

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - ".github/workflows/typescript.yml"

jobs:
  oxfmt-check:
    name: 🎨 Format (oxfmt)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: 🎨 Check formatting
        run: pnpm fmt:oxc:check

  oxlint:
    name: 🔍 Lint (oxlint)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: 🔍 Run oxlint
        run: pnpm lint:oxc

  typecheck:
    name: 🏷️ Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: 🏷️ Run typecheck
        run: pnpm typecheck

  vitest:
    name: 🧪 Test (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: 🧪 Run tests
        run: pnpm turbo test --filter='!@unifast/node' --filter='!@unifast/website'
