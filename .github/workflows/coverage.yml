name: Coverage

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-coverage:
    name: 🦀 Rust Coverage
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview

      - name: 🔧 Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: 📊 Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path rust-lcov.info

      - name: 📤 Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: rust-lcov.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  ts-coverage:
    name: 🟢 TypeScript Coverage
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node

      - name: 🏗️ Build packages
        run: pnpm turbo build --filter='!@unifast/website'

      - name: 🧪 Run tests with coverage
        run: pnpm turbo test:coverage --filter='!@unifast/node' --filter='!@unifast/website'

      - name: 📊 Merge lcov files
        run: |
          mkdir -p coverage
          cat packages/*/coverage/lcov.info > coverage/ts-lcov.info 2>/dev/null || true

      - name: 📤 Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/ts-lcov.info
          flags: typescript
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
