name: Coverage

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-coverage:
    name: 🦀 Rust Coverage
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: 🔧 Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: 💾 Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cov-

      - name: 📊 Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path rust-lcov.info

      - name: 📤 Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: rust-lcov.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  ts-coverage:
    name: 🟢 TypeScript Coverage
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build packages
        run: pnpm build

      - name: 🧪 Run tests with coverage
        run: pnpm test:coverage

      - name: 📊 Merge lcov files
        run: |
          mkdir -p coverage
          cat packages/*/coverage/lcov.info > coverage/ts-lcov.info 2>/dev/null || true

      - name: 📤 Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/ts-lcov.info
          flags: typescript
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
