name: Knip

on:
  push:
    branches: [main]
  pull_request:

jobs:
  knip:
    name: 🧹 Dead Code Detection
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🧹 Run Knip
        run: pnpm knip
