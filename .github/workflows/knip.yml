name: Knip

on:
  push:
    branches: [main]
  pull_request:

jobs:
  knip:
    name: 🧹 Dead Code Detection
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: 🏗️ Build packages
        run: pnpm turbo build --filter='!@unifast/website'
      - name: 🧹 Run Knip
        run: pnpm knip
