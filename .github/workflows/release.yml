name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: ✅ Pre-release Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 💾 Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: 🔨 Check
        run: cargo check --all-targets --all-features

      - name: 📎 Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: 🧪 Test
        run: cargo test --all --all-features

      - name: 🎨 Format check
        run: cargo fmt --all -- --check

  publish-crates:
    name: 📦 Publish to crates.io
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Publish unifast-core
        run: cargo publish -p unifast-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: ⏳ Wait for unifast-core on crates.io
        run: |
          wait_for_crate() {
            local crate="$1" version="$2"
            echo "Waiting for $crate@$version on crates.io..."
            for i in $(seq 1 30); do
              if curl -sf "https://crates.io/api/v1/crates/$crate/$version" > /dev/null 2>&1; then
                echo "$crate@$version is available"
                return 0
              fi
              sleep 2
            done
            echo "Warning: timeout waiting for $crate@$version, proceeding anyway"
          }
          VERSION="${GITHUB_REF_NAME#v}"
          wait_for_crate "unifast-core" "$VERSION"

      - name: 📦 Publish unifast-bindings-node
        run: cargo publish -p unifast-bindings-node
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: 📦 Publish unifast-bindings-wasm
        run: cargo publish -p unifast-bindings-wasm
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: 📦 Publish unifast-cli
        run: cargo publish -p unifast-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-node-binding:
    name: 🔨 Build Node Binding (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-x64-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: linux-x64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-arm64-gnu
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: win32-x64
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 🔧 Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: 🔧 Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: 🔨 Build native module
        run: cargo build -p unifast-bindings-node --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/*.node
          if-no-files-found: warn

  publish-npm:
    name: 📦 Publish to npm
    runs-on: ubuntu-latest
    needs: [build-node-binding, publish-crates]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build TypeScript packages
        run: pnpm build

      - name: 📥 Download all native binding artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 📂 Move native bindings
        run: |
          mkdir -p packages/node/native
          for dir in artifacts/binding-*; do
            platform=$(basename "$dir" | sed 's/binding-//')
            cp "$dir"/*.node "packages/node/native/unifast.${platform}.node" 2>/dev/null || true
          done
          ls -la packages/node/native/ || echo "No native bindings found"

      - name: 🚀 Publish packages
        run: |
          pnpm --filter @unifast/core publish --no-git-checks --access public
          pnpm --filter @unifast/node publish --no-git-checks --access public
          pnpm --filter @unifast/react publish --no-git-checks --access public
          pnpm --filter @unifast/shiki publish --no-git-checks --access public
          pnpm --filter @unifast/highlight publish --no-git-checks --access public
          pnpm --filter @unifast/vite publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: 🏷️ Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-crates]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: 📝 Generate release notes
        run: git-cliff --latest --strip header > RELEASE_NOTES.md

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 🏷️ Create GitHub Release
        run: |
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file RELEASE_NOTES.md \
            artifacts/binding-*/*.node || \
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
